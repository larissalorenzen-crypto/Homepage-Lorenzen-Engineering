<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seite nicht gefunden – Lorenzen Engineering</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .container { max-width: 480px; }
      .code {
        font-size: 6rem;
        font-weight: 700;
        color: #005B8C;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: #f1f5f9;
      }
      p {
        color: #94a3b8;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        background: #005B8C;
        color: white;
        padding: 0.875rem 2rem;
        border-radius: 9999px;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
      }
      a:hover { background: #004A73; }
    </style>
    <script>
      // Weiterleitung zur Startseite nach 4 Sekunden
      setTimeout(function() {
        window.location.href = "/";
      }, 4000);
    </script>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Seite nicht gefunden</h1>
      <p>Diese Seite existiert nicht. Sie werden automatisch zur Startseite weitergeleitet.</p>
      <a href="/">Zur Startseite</a>
    </div>
  </body>
</html>
